name: Build PrepFlow for Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out PrepFlow
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pytest

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest -q

      - name: Build Windows application
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm PrepFlow.spec

      - name: Create Windows ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\PrepFlow `
            -DestinationPath PrepFlow-Windows-x86_64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: PrepFlow-Windows-x86_64
          path: PrepFlow-Windows-x86_64.zip
          if-no-files-found: error
